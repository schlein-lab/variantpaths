name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: System deps (egui)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        continue-on-error: true
      - name: cargo clippy
        run: cargo clippy --all-targets
      - name: cargo test
        run: cargo test --all-targets

  build-linux:
    name: Build Linux release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System deps (egui)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --locked
      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/release/variantpaths dist/variantpaths-linux-x86_64
          cp -v samples/*.vpf samples/*.vpz dist/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: variantpaths-linux-x86_64
          path: dist/

  build-windows:
    name: Cross-compile Windows .exe
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install mingw-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-gnu
      - name: Build for x86_64-pc-windows-gnu
        run: cargo build --release --locked --target x86_64-pc-windows-gnu
      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-gnu/release/variantpaths.exe dist/VariantPaths.exe
          cp -v samples/*.vpf samples/*.vpz dist/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: VariantPaths-windows-x86_64
          path: dist/

  release:
    name: Publish release on tag
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage release files
        run: |
          mkdir -p release
          cp artifacts/variantpaths-linux-x86_64/variantpaths-linux-x86_64 release/
          cp artifacts/VariantPaths-windows-x86_64/VariantPaths.exe release/
          # Sample data, if produced by the build jobs
          cp artifacts/variantpaths-linux-x86_64/*.vpf release/ 2>/dev/null || true
          cp artifacts/variantpaths-linux-x86_64/*.vpz release/ 2>/dev/null || true
          ls -la release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
